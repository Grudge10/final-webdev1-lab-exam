<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="PokéTerminal Java project thumbnail">
  <rect width="600" height="400" fill="#2a1d10"/>
  <g>
    <rect x="100" y="50" width="400" height="300" rx="12" fill="#120a04"/>
    <rect x="100" y="50" width="400" height="32" rx="12" fill="#382515"/>
    <circle cx="120" cy="66" r="5" fill="#ea580c"/>
    <circle cx="136" cy="66" r="5" fill="#fbbf24"/>
    <circle cx="152" cy="66" r="5" fill="#10b981"/>
    <text x="300" y="71" font-family="'Courier New', monospace" font-size="11" font-weight="600" fill="#c9a87c" text-anchor="middle">poketerminal — bash</text>
    <text x="120" y="110" font-family="'Courier New', monospace" font-size="13" fill="#10b981">$ java -jar poketerminal.jar</text>
    <text x="120" y="134" font-family="'Courier New', monospace" font-size="12" fill="#c9a87c">Welcome to PokéTerminal!</text>
    <text x="120" y="156" font-family="'Courier New', monospace" font-size="12" fill="#b09880">Choose your starter:</text>
    <g>
      <circle cx="150" cy="190" r="24" fill="#ea580c"/>
      <circle cx="150" cy="190" r="12" fill="#fbbf24"/>
      <circle cx="150" cy="190" r="8" fill="#fff"/>
    </g>
    <text x="150" y="232" font-family="'Courier New', monospace" font-size="10" fill="#fbbf24" text-anchor="middle">Charmander</text>
    <g>
      <circle cx="300" cy="190" r="24" fill="#06b6d4"/>
      <circle cx="300" cy="190" r="12" fill="#fff"/>
    </g>
    <text x="300" y="232" font-family="'Courier New', monospace" font-size="10" fill="#06b6d4" text-anchor="middle">Squirtle</text>
    <g>
      <circle cx="450" cy="190" r="24" fill="#10b981"/>
      <circle cx="450" cy="190" r="12" fill="#fbbf24"/>
    </g>
    <text x="450" y="232" font-family="'Courier New', monospace" font-size="10" fill="#10b981" text-anchor="middle">Bulbasaur</text>
    <text x="120" y="270" font-family="'Courier New', monospace" font-size="12" fill="#b09880">&gt; 1</text>
    <text x="120" y="292" font-family="'Courier New', monospace" font-size="12" fill="#10b981">You chose Charmander!</text>
    <text x="120" y="318" font-family="'Courier New', monospace" font-size="12" fill="#c9a87c">HP: 39/39  |  ATK: 52  |  DEF: 43</text>
    <text x="120" y="338" font-family="'Courier New', monospace" font-size="11" fill="#b09880" opacity="0.6">_</text>
  </g>
  <text x="300" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#f5e6d3" text-anchor="middle" opacity="0.95">PokéTerminal</text>
</svg>
